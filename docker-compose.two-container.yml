# Two-container Docker Compose: Hermes Agent + AVOI WebUI
#
# This runs the agent and web UI in separate containers connected via
# shared volumes. The WebUI installs the agent's Python dependencies
# at startup from the shared agent source volume.
#
# Usage:
#   docker compose -f docker-compose.two-container.yml up -d
#
# The agent container runs the gateway (CLI, Telegram, cron, etc.).
# The WebUI container serves the browser interface on port 8787.
# Both share ~/.avoi for config, sessions, and state.
#
# NOTE ON VOLUMES:
#   This file uses named Docker volumes (hermes-home, avoi-agent-src) which
#   work out of the box. If you prefer bind mounts (e.g. to an existing directory),
#   replace the named volumes at the bottom. Example for avoi-agent-src:
#
#     avoi-agent-src:
#       driver: local
#       driver_opts:
#         type: none
#         o: bind
#         device: /opt/avoi-agent
#
#   When using bind mounts, BOTH containers must mount the same host path.
#   The agent exposes source at /opt/hermes, the WebUI reads it from
#   /home/avoiwebui/.avoi/avoi-agent — as long as both point to the
#   same host directory, the paths align correctly.

services:
  avoi-agent:
    image: nousresearch/avoi-agent:latest
    container_name: avoi-agent
    command: gateway run
    ports:
      # Gateway API — exposed on localhost only.
      # Other containers on hermes-net reach it via http://avoi-agent:8642.
      # Remove 127.0.0.1: to expose on the host network (e.g. for remote clients).
      - "127.0.0.1:8642:8642"
    volumes:
      # Persist config, state, sessions, skills, memory across restarts
      - hermes-home:/home/hermes/.avoi
      # Expose agent source so the WebUI can install dependencies from it
      - avoi-agent-src:/opt/hermes
    environment:
      - AVOI_HOME=/home/hermes/.avoi
    restart: unless-stopped
    networks:
      - hermes-net

  avoi-webui:
    image: ghcr.io/nesquena/hermes-webui:latest
    container_name: avoi-webui
    depends_on:
      - avoi-agent
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      # Same hermes home as the agent — shares config, sessions, state
      - hermes-home:/home/avoiwebui/.avoi
      # Agent source mounted where docker_init.bash expects it.
      # At startup the init script runs:
      #   uv pip install /home/avoiwebui/.avoi/avoi-agent
      # which installs the agent and all its Python dependencies.
      - avoi-agent-src:/home/avoiwebui/.avoi/avoi-agent
      # Workspace directory — browse and edit files from the WebUI.
      # Adapt the host path to your project directory.
      # Override with: AVOI_WORKSPACE=/your/path docker compose up
      - ${AVOI_WORKSPACE:-~/workspace}:/workspace
    environment:
      - AVOI_WEBUI_HOST=0.0.0.0
      - AVOI_WEBUI_PORT=8787
      - AVOI_WEBUI_STATE_DIR=/home/avoiwebui/.avoi/webui
      # Match your host user's UID/GID for correct file permissions.
      # In two-container setups the WebUI auto-detects UID/GID from the shared
      # hermes-home volume, but you can override explicitly if needed (#668):
      # Run `id -u` and `id -g` to find your values.
      # On macOS, UIDs start at 501 — set these in a .env file:
      #   echo "UID=$(id -u)" >> .env && echo "GID=$(id -g)" >> .env
      - WANTED_UID=${UID:-1000}
      - WANTED_GID=${GID:-1000}
      # Optional: set a password for remote access
      # - AVOI_WEBUI_PASSWORD=***
    restart: unless-stopped
    networks:
      - hermes-net

networks:
  hermes-net:
    driver: bridge

volumes:
  hermes-home:
  avoi-agent-src:
